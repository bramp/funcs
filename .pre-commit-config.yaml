repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: make-lint
        name: make lint
        entry: make lint
        language: system
        files: \.(js|json|md)$
        pass_filenames: false

      - id: make-test
        name: make test
        entry: make test
        language: system
        files: \.(js|json|md)$
        pass_filenames: false

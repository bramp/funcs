name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'vanguard/**'
      - '!vanguard/test.js'
      - '!vanguard/README.md'
      - '!vanguard/Makefile'

jobs:
  test:
    uses: ./.github/workflows/test.yml

  deploy-vanguard:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v6

      - name: 'Check secrets'
        env:
          WIF_PROVIDER_NAME: ${{ secrets.WIF_PROVIDER_NAME }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GA_MEASUREMENT_ID: ${{ secrets.GA_MEASUREMENT_ID }}
          GA_API_SECRET: ${{ secrets.GA_API_SECRET }}
        run: |
          if [ -z "$WIF_PROVIDER_NAME" ]; then echo "WIF_PROVIDER_NAME secret is not set"; exit 1; fi
          if [ -z "$GCP_SERVICE_ACCOUNT" ]; then echo "GCP_SERVICE_ACCOUNT secret is not set"; exit 1; fi
          if [ -z "$GCP_PROJECT_ID" ]; then echo "GCP_PROJECT_ID secret is not set"; exit 1; fi
          if [ -z "$GA_MEASUREMENT_ID" ]; then echo "GA_MEASUREMENT_ID secret is not set"; exit 1; fi
          if [ -z "$GA_API_SECRET" ]; then echo "GA_API_SECRET secret is not set"; exit 1; fi

      - id: 'auth'
        uses: 'google-github-actions/auth@v3'
        with:
          workload_identity_provider: '${{ secrets.WIF_PROVIDER_NAME }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'

      - id: 'deploy'
        uses: 'google-github-actions/deploy-cloud-functions@v4'
        timeout-minutes: 10
        with:
          name: 'vanguard'
          runtime: 'nodejs24'
          source_dir: 'vanguard'
          entry_point: 'vanguard'
          region: 'us-central1'
          memory: '128Mi'
          project_id: '${{ secrets.GCP_PROJECT_ID }}'
          environment_variables: 'GA_MEASUREMENT_ID=${{ secrets.GA_MEASUREMENT_ID }},GA_API_SECRET=${{ secrets.GA_API_SECRET }}'
